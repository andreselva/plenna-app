services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: react_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8001
    stdin_open: true
    tty: true
